<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/cart"></ion-back-button>
    </ion-buttons>
    <ion-title>New Order</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <form [formGroup]="form">
    <ion-grid>
      <ion-row>
        <ion-col size-md="6" size-lg="5" size-xs="12">
          <div>

            <ion-item>
              <ion-img src="https://www.clipartmax.com/png/middle/279-2798375_uber-for-food-delivery-app-shopee-cod-and-free-shipping.png"></ion-img>
            </ion-item>
            <ion-item>
              <ion-input name="country" type="text" placeholder="Country" formControlName="country"></ion-input>
            </ion-item>
            <ion-item>
              <ion-input name="city" type="text" placeholder="City" formControlName="city"></ion-input>
            </ion-item>
            <ion-item>
              <ion-input name="address" type="text" placeholder="Address" formControlName="address"></ion-input>
            </ion-item>
          </div>
          <div>
            <ion-button  size="large" expand="block" (click)="handleAddOrder()">Done<ion-icon slot="end" name="cloud-done"></ion-icon></ion-button>
          </div>
        </ion-col>
      </ion-row>
    </ion-grid>
  </form>
</ion-content>
