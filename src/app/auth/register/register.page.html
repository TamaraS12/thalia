<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login"></ion-back-button>
    </ion-buttons>
    <ion-title>Register</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <form [formGroup]="form">
    <ion-grid>
      <ion-row>
        <ion-col size-md="6" size-lg="5" size-xs="12">
          <div>
            <ion-img src="assets/images/login.png"></ion-img>
            <ion-item>
              <ion-input name="username" type="text" placeholder="Username" formControlName="username"></ion-input>
            </ion-item>
            <ion-item>
              <ion-input name="password" type="password" placeholder="Password" formControlName="password"></ion-input>
            </ion-item>
            <ion-item>
              <ion-input name="confirm" type="password" placeholder="Confirm password" formControlName="confirmedPassword"></ion-input>
            </ion-item>

            @if (form.errors?.['passwordsMismatch'] && form.get('confirmedPassword')?.touched) {
              <div style="color: red; font-size: 0.8rem;">
                Passwords do not match
              </div>
            }

          </div>
          <div>
            <ion-button  size="large" expand="block" (click)="handleRegister()" [disabled]="form.invalid">Register</ion-button>
          </div>
        </ion-col>
      </ion-row>
    </ion-grid>
  </form>
</ion-content>
