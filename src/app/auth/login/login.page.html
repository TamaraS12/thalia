<ion-content [fullscreen]="true">
  <ion-content [fullscreen]="true">
    <form [formGroup]="form">
      <ion-grid>
        <ion-row>
          <ion-col size-md="6" size-lg="5" size-xs="12">
            <div>
              <ion-img src="assets/images/login.png"></ion-img>
              <ion-item>
                <ion-input name="username" type="text" placeholder="Username" formControlName="username"></ion-input>
              </ion-item>
              <ion-item>
                <ion-input name="password" type="password" placeholder="Password" formControlName="password"></ion-input>
              </ion-item>
            </div>
            <div>
              <ion-button  size="large" expand="block" (click)="handleLogin()" [disabled]="form.invalid">Login</ion-button>
            </div>
            <div>
              <ion-button routerLink="/register" fill="clear" slot="end" size="medium" expand="block">Register</ion-button>
            </div>
          </ion-col>
        </ion-row>
      </ion-grid>
    </form>
  </ion-content>

</ion-content>
