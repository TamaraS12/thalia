<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>

    <ion-title>Cart</ion-title>

  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-grid>
    <ion-row>
      <ion-col size="12" size-sm="8" offset-sm="2">
        @if (cart().items.length) {
          <ion-list>
            @for (item of cart().items; track item) {
              <ion-item-sliding #slidingItem>
                <ion-item>
                  <ion-thumbnail slot="start">
                    <ion-img [src]="apiBaseUrl + item.book.imageUrl"></ion-img>
                  </ion-thumbnail>
                  <ion-label>
                    <h1>{{ item.book.title }}</h1>
                    <p>Quantity: {{ item.quantity }}</p>
                    <p>Amount: {{ item.amount | currency }}</p>
                  </ion-label>
                </ion-item>
                <ion-item-options side="end">
                  <ion-item-option
                    color="secondary"
                    (click)="handleEdit(item)"
                  >
                    <ion-icon name="create" slot="icon-only"></ion-icon>
                  </ion-item-option>
                  <ion-item-option
                    color="secondary"
                    (click)="handleDelete(item)"
                  >
                    <ion-icon name="trash" slot="icon-only"></ion-icon>
                  </ion-item-option>
                </ion-item-options>
              </ion-item-sliding>

            }

            <ion-label>
              <h1 style="text-align: right; margin: 20px;">
                Total : {{ cart().totalAmount | currency}}
              </h1>
            </ion-label>
            <div>
              <ion-button size="large" expand="block" (click)="handleOrder()">Order now<ion-icon slot="end" name="paper-plane"></ion-icon></ion-button>
            </div>
          </ion-list>
        } @else {
          <ion-label>
            Your shopping cart is empty.
          </ion-label>
        }

      </ion-col>
    </ion-row>

  </ion-grid>
</ion-content>
